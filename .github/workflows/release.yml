name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    # Avoid re-running when the version-bump commit is pushed back to master
    if: ${{ github.event_name == 'workflow_dispatch' || !startsWith(github.event.head_commit.message, 'Release v') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Bump patch version (+0.0.1)
        id: version
        shell: bash
        run: |
          set -euo pipefail
          CURRENT=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)
          if [[ ! "$CURRENT" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)(.*)$ ]]; then
            echo "Unexpected version format: $CURRENT" >&2
            exit 1
          fi
          MAJOR="${BASH_REMATCH[1]}"
          MINOR="${BASH_REMATCH[2]}"
          PATCH="${BASH_REMATCH[3]}"
          SUFFIX="${BASH_REMATCH[4]}"
          NEXT_PATCH=$((PATCH + 1))
          NEXT="${MAJOR}.${MINOR}.${NEXT_PATCH}${SUFFIX}"

          mvn -q org.codehaus.mojo:versions-maven-plugin:2.18.0:set \
            -DnewVersion="$NEXT" \
            -DgenerateBackupPoms=false
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Bumped version $CURRENT -> $NEXT"

      - name: Build shaded jar
        run: mvn -B clean package

      - name: Commit version bump
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pom.xml
          git commit -m "Release v${{ steps.version.outputs.next }}"
          git tag "v${{ steps.version.outputs.next }}"
          git push origin HEAD:"${{ github.ref_name }}"
          git push origin "v${{ steps.version.outputs.next }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.next }}"
          JAR="target/WHIMC-PositionTracker-${VERSION}.jar"
          gh release create "v${VERSION}" "$JAR" \
            --title "WHIMC-PositionTracker-${VERSION}" \
            --notes "Automated release for v${VERSION}."
